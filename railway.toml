# Railway configuration for AigniteQuant API
# Deploy as 2 services in Railway (was 3):
# 1. api-service (this config) -- FastAPI app; also runs the
#    market-pulse refresh loop in-process.
# 2. celery-worker-service (python start_celery_worker.py) -- runs the
#    Celery worker WITH Beat embedded (-B), so a separate beat service
#    is no longer needed.
# ACTION REQUIRED: delete the old 'celery-beat-service' in the Railway
# dashboard to stop paying for that always-on service.

[build]
builder = "nixpacks"

[deploy]
# API Service - Main FastAPI application
startCommand = "python start_api.py"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Celery Worker Service (also runs Beat embedded via -B)
[services.celery-worker-service]
startCommand = "python start_celery_worker.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5